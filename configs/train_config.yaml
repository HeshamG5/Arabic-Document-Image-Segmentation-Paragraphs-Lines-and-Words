experiment:
  path: experiments
  name: exp_001

data:
  processed_dir: data/processed
  image_height: 512
  image_width: 512

model:
  in_channels: 3
  out_channels: 1
  features: [64, 128, 256, 512]

training:
  batch_size: 8
  epochs: 10
  learning_rate: 0.001
  optimizer: "adam"
  loss: "dice_loss"
  save_frequency: 5
  num_workers: 2
  checkpoint_dir: "checkpoints"
  log_dir: "logs"
  seed: 42
  device: "cuda"